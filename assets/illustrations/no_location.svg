<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#FF6B1A" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FF6B1A" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Soft glow -->
  <circle cx="120" cy="120" r="90" fill="url(#glow)"/>

  <!-- Outer compass ring -->
  <circle cx="120" cy="120" r="68" fill="none" stroke="#22304F" stroke-width="2"/>
  <circle cx="120" cy="120" r="58" fill="#111A2E" stroke="#FF6B1A" stroke-width="2"/>

  <!-- Compass ticks -->
  <g stroke="#9AA4BD" stroke-width="2" stroke-linecap="round">
    <line x1="120" y1="58" x2="120" y2="70"/>
    <line x1="120" y1="170" x2="120" y2="182"/>
    <line x1="58"  y1="120" x2="70"  y2="120"/>
    <line x1="170" y1="120" x2="182" y2="120"/>
  </g>

  <!-- Compass needle -->
  <path d="M 120 70 L 134 124 L 120 116 L 106 124 Z" fill="#FF6B1A"/>
  <path d="M 120 170 L 106 116 L 120 124 L 134 116 Z" fill="#F5F6FA" opacity="0.85"/>

  <!-- Center dot -->
  <circle cx="120" cy="120" r="6" fill="#0B1220" stroke="#FFB154" stroke-width="2"/>

  <!-- North label -->
  <text x="120" y="52" text-anchor="middle" font-family="Roboto, sans-serif"
        font-size="13" font-weight="700" fill="#FFB154">N</text>
</svg>
