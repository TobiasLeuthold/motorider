name: motorider
description: "Personal motorcycle fuel and stats tracker"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Data
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.0
  csv: ^6.0.0
  uuid: ^4.5.1

  # Location
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Charts & UI
  fl_chart: ^0.69.2
  flutter_svg: ^2.0.16
  intl: ^0.20.2

  # Sync (NAS / PocketBase)
  http: ^1.2.2
  connectivity_plus: ^6.1.0
  shared_preferences: ^2.3.3
  share_plus: ^13.1.0
  wakelock_plus: ^1.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.2
  sqflite_common_ffi: ^2.3.4
  xml: ^6.6.1
  # Lets tests supply a fake GeolocatorPlatform (via MockPlatformInterfaceMixin)
  # so RideTracker can be exercised headlessly. Already pulled in transitively.
  plugin_platform_interface: ^2.1.8

flutter:
  uses-material-design: true
  assets:
    - assets/sample_data/
    - assets/illustrations/
    - assets/icon/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0B1220"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  min_sdk_android: 21
